name: Lint

on:
    push:
        branches:
            - "**"
    pull_request:

jobs:
    pylint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Configurar Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Instalar dependências
              run: |
                  python -m pip install --upgrade pip
                  pip install -e ".[dev]"

            - name: Executar Pylint
              run: |
                  pylint bot_moodle
